services:

  # ────────────────────────────────────────────
  # Redis — Backbone
  # ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fw-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fw-net

  # ────────────────────────────────────────────
  # Worker Node 01
  # ────────────────────────────────────────────
  worker-a:
    build:
      context: ./example-app
      dockerfile: Dockerfile
    container_name: Hydra-Processor-01
    hostname: Hydra-Processor-01
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_MODE=worker
      - JAVA_OPTS=-Xms128m -Xmx512m
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fw-net
    restart: unless-stopped
    command: ["worker"]

  # ────────────────────────────────────────────
  # Worker Node 02
  # ────────────────────────────────────────────
  worker-b:
    build:
      context: ./example-app
      dockerfile: Dockerfile
    container_name: Hydra-Processor-02
    hostname: Hydra-Processor-02
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_MODE=worker
      - JAVA_OPTS=-Xms128m -Xmx512m
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fw-net
    restart: unless-stopped
    command: ["worker"]

  # ────────────────────────────────────────────
  # API Gateway
  # ────────────────────────────────────────────
  api-gateway:
    build:
      context: ./example-app
      dockerfile: Dockerfile
    container_name: Global-API-Gateway
    hostname: Global-API-Gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_MODE=dispatcher
      - JAVA_OPTS=-Xms64m -Xmx256m
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fw-net
    restart: unless-stopped
    command: ["dispatcher"]

  # ────────────────────────────────────────────
  # Redis Insight
  # ────────────────────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: fw-redis-insight
    ports:
      - "8001:5540"
    depends_on:
      - redis
    networks:
      - fw-net

volumes:
  redis_data:

networks:
  fw-net:
    driver: bridge
